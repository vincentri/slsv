app: bucket-app

functions:
  api:
    runtime: nodejs22
    handler: ./src/api.handler
    http:
      - method: GET
        path: /api/files/{key+}
      - method: POST
        path: /api/upload-url
      - method: PUT
        path: /api/files/{key+}

buckets:
  # Private: only Lambda reads/writes. Used for processed/internal artifacts.
  private: {}

  # Public read: anyone can fetch objects via the bucket URL. Good for avatars,
  # processed images, or static assets the browser caches directly.
  public:
    publicRead: true

  # CORS-enabled (but private): browser uploads via presigned PUT, then the
  # function reads for processing. Pair with `storage().putSignedUrl()` in the SDK.
  uploads:
    cors: ['http://localhost:5173', 'https://app.example.com']