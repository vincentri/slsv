app: demo

functions:
  api:
    runtime: nodejs22
    handler: ./backend/api.handler
    http:
      - method: ANY
        path: /api/{proxy+}
      - method: GET
        path: /r/{code}
      - method: GET
        path: /health

  webhook:
    runtime: nodejs22
    handler: ./backend/webhooks/ping.handler
    http:
      - method: POST
        path: /webhooks/ping

  trackClick:
    runtime: nodejs22
    handler: ./backend/jobs/track-click.handler
    queue:
      name: clicks

  dailyReport:
    runtime: nodejs22
    handler: ./backend/jobs/daily-report.handler
    cron:
      schedule: "rate(1 minute)"

queues:
  clicks:
    type: sqs

databases:
  links:
    type: dynamodb
    partitionKey:
      name: code
      type: S
    gsi:
      - name: byUrl
        partitionKey:
          name: url
          type: S
  analytics:
    type: postgres
    name: analytics
    init_sql: ./schema.sql

buckets:
  reports: {}

caches:
  links:
    type: valkey
    nodeType: cache.t4g.micro

secrets:
  - WEBHOOK_SECRET

frontend:
  src: ./frontend/dist
  build: cd frontend && pnpm install && pnpm run build
