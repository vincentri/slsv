# slsv.yml — full reference. Every knob shown. Copy, trim, ship.
# All optional fields have sane defaults; minimal slsv.yml = just `app:` + one resource.
#
# Stages: `slsv deploy --stage prod` namespaces every resource as <app>-<stage>-<name>,
# so dev/prod coexist. Per-stage secrets load from `.env.<stage>` (falls back to `.env`).
# Default stage is `dev`. No per-stage yml block — same shape, different secrets/values.

app: my-app

functions:
  api:
    runtime: nodejs22
    handler: ./src/api.handler
    http:
      - method: ANY
        path: /api/{proxy+}
      - method: GET
        path: /health
    # timeout: 30                      # seconds, 1-900 (default 30)
    # memory: 256                      # MB, 128-10240 (default 256)
    # architecture: arm64              # arm64 (default, cheaper+faster) | x86_64. Immutable after create.
    # ephemeralStorage: 512            # /tmp size MB, 512-10240 (default 512)
    # tracing: true                    # X-Ray active tracing
    # reservedConcurrency: 10          # cap concurrent executions (0 = throttle all)
    # provisionedConcurrency: 2        # warm instances, no cold start (--target aws only).
    # Publishes a version + `live` alias; costs $ 24/7.
    # environment:                     # custom env vars (slsv bindings always win)
    #   LOG_LEVEL: debug

  worker:
    runtime: nodejs22
    handler: ./src/worker.handler
    queue: { name: jobs } # SQS trigger — Lambda invoked per message

  cron:
    runtime: nodejs22
    handler: ./src/cron.handler
    cron: { schedule: "0 8 * * *" } # EventBridge — 5-field unix cron OR rate()

  onOrder:
    runtime: nodejs22
    handler: ./src/on-order.handler
    event: # EventBridge event-pattern — invoked when a matching event hits the default bus
      pattern:
        source: ["orders"]
        detail-type: ["order.placed"]

api: # optional — HTTP API Gateway settings
  # Origins allowed to call the API from a browser (CORS AllowOrigins). Omit this whole block
  # → '*' (open; required when the S3-hosted frontend is a different origin). Set it to lock
  # the API to your own site(s). Methods + headers stay '*'. Applied every deploy (drift-safe).
  cors:
    - https://myapp.com
    - https://www.myapp.com
  # Custom domain for the API (aws-only). slsv does EVERYTHING: ACM cert (DNS-validated),
  # regional API Gateway custom domain, API mapping, and the public DNS record. Zero manual DNS.
  # You supply exactly two things:
  #   1. domain below — the hostname you want.
  #   2. a Cloudflare API token in .env  →  CLOUDFLARE_API_TOKEN=...
  #      (dash.cloudflare.com → My Profile → API Tokens; permission: Zone.DNS Edit). It's a
  #      secret, so it lives in .env, never in this file.
  # slsv finds the Cloudflare zone that owns the domain on its own — no zone/id to look up.
  # DNS provider is Cloudflare only for now (Route53 support is planned).
  domain: api.myapp.com
  # certArn: arn:aws:acm:...:certificate/xxx   # rare — reuse an existing ACM cert instead of
  #                                            #        slsv minting one (e.g. a wildcard)

queues:
  jobs:
    type: sqs
    # fifo: true                       # FIFO ordering + dedup (suffix .fifo auto-added)
    # visibilityTimeout: 60            # seconds (default 30, max 43200)
    # dlq: jobsFailed                  # logical name of another queue (must exist)

  # jobsFailed: { type: sqs }         # DLQ target — FIFO main queue needs FIFO DLQ

  # ordered:
  #   type: sqs
  #   fifo: true

buckets:
  private: {} # only Lambda reads/writes
  # public:                                     # browser reads objects via the bucket URL
  #   publicRead: true                          # → s3:GetObject policy + access blocks off
  # uploads:                                    # browser uploads via presigned PUT
  #   cors: ['https://app.example.com']         # → PutBucketCors for the listed origins

databases:
  # dynamodb — NoSQL table; access with db('orders') → DATABASE_ORDERS
  orders:
    type: dynamodb
    partitionKey: { name: id, type: S } # S | N | B
    sortKey: { name: createdAt, type: S } # optional
    gsi: # optional (dynamodb only)
      - name: byUser
        partitionKey: { name: userId, type: S }
        sortKey: { name: createdAt, type: S }

  # postgres / mysql — SQL instance via RDS API; access with db('primary') → DATABASE_PRIMARY
  primary:
    type: postgres
    # name: primary                    # actual DB name; defaults to logical key
    # init_sql: ./schema.sql           # path to SQL, runs once on first creation
    # instanceClass: db.t3.micro       # RDS class (--target aws only; default db.t3.micro)
    # storage: 20                      # GB (--target aws only; default 20, max 65536)
    # multiAz: false                   # (--target aws only)
    # skipFinalSnapshot: true          # destroy takes NO final snapshot (default true).
    # false → destroy saves a timestamped snapshot first.

  # replica:
  #   type: mysql
  #   instanceClass: db.t4g.small

  # ── Hosted Postgres (Supabase / Neon / RDS you manage yourself) ──
  # slsv only provisions dynamodb/postgres/mysql. For a DB you host elsewhere, don't put it
  # here — put the connection string in `secrets:` (it's a password) and connect with your
  # own driver (pg / Prisma / Drizzle / postgres.js):
  #
  #   secrets: [DATABASE_URL]                 # handler: const url = await secret('DATABASE_URL')
  #
  # .env:      DATABASE_URL=postgresql://postgres.xxxx:PW@aws-0-region.pooler.supabase.com:6543/postgres
  # Use Supabase's TRANSACTION POOLER (port 6543), not direct :5432 — Lambda opens many
  # short connections and would exhaust the direct limit. Per-stage: .env.prod = prod project.

caches:
  session:
    type: valkey # `type: redis` is an alias — same backend
    # nodeType: cache.t4g.micro        # ElastiCache node type (--target aws only; default t4g.micro)
    # nodes: 1                         # NumCacheNodes (--target aws only; 1-5)

  # big:
  #   type: valkey
  #   nodeType: cache.r6g.large
  #   nodes: 3

secrets:
  # Names only. Values come from .env.<stage> (falls back to .env) and are stored in AWS
  # Secrets Manager as <app>-<stage>-<NAME>. The VALUE is never put in the function env —
  # fetch it at runtime:  const jwt = await secret('JWT_SECRET')   (from '@slsv/sdk').
  # Per stage: .env = dev, .env.prod = prod, .env.staging = staging.
  - JWT_SECRET
  - WEBHOOK_SECRET

tags:
  # Custom tags applied to EVERY provisioned resource (on top of the automatic
  # slsv:managed-by / slsv:app / slsv:stage tags). Use for cost allocation / ownership.
  Team: payments
  CostCenter: eng-42

# logRetentionDays: 14   # CloudWatch log retention for all functions (default 14; 0 = never
# expire). Must be a CloudWatch value: 1,3,5,7,14,30,60,90,...,3653.

# autoRemove: false   # default false (safe): a data store (DynamoDB/S3/RDS) dropped from this
# yml is REPORTED on the next deploy and left until `slsv destroy`. Set true to DELETE such
# orphans on deploy (with their data — destructive). Lambda/EventBridge/frontend always prune.
# Run `slsv plan` to preview exactly what a deploy would create/update/delete first.

frontend:
  src: ./frontend/dist # build output to serve
  build: npm --prefix frontend install && npm --prefix frontend run build # build cmd
  # cloudfront: true                  # aws-only. Serves the frontend + /api/* under one
  # HTTPS *.cloudfront.net domain (S3 website endpoints
  # are HTTP-only). Skips the VITE_SLSV_API_URL injection
  # so /api calls stay relative (same-origin). Deploy and
  # destroy each take ~15-20 min (CloudFront propagation).

# ── Per-stage overrides (optional) ──────────────────────────────────────────
# `stages.<name>` deep-merges over the base above for `--stage <name>`. Override ONLY
# what differs; everything else is inherited. Objects merge, scalars/arrays replace,
# and `key: null` REMOVES a base key (used below to swap a trigger). Keep blocks small —
# dev/prod parity is the goal; overlays are for controlled differences, not a fork.
#
# stages:
#   prod:
#     functions:
#       worker:
#         timeout: 300               # prod worker needs longer; dev keeps its default
#     frontend:
#       cloudfront: true             # CDN only in prod
#
#   dev:
#     functions:
#       worker:
#         queue: null                # drop the SQS trigger in dev...
#         event:                     # ...and experiment with EventBridge instead
#           pattern:
#             source: ['orders']
