name: Release

on:
  workflow_dispatch: # manual — Actions tab → Run workflow

permissions:
  contents: write # push the version bump commit + create the release/tag

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 11

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          registry-url: https://registry.npmjs.org

      - run: pnpm install --frozen-lockfile

      # Apply pending changesets (bump versions + changelogs, delete consumed changesets).
      - run: pnpm version-packages

      # Commit the bump locally (no push yet — publish adds the tags).
      - name: Commit version bump
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git commit -am "chore: version packages" || echo "nothing to commit"

      # build + publish. pnpm -r publish rewrites workspace:* → real version and
      # prints npm's real error (changesets 2.31.0's publisher masks it as a TypeError).
      - run: pnpm release
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      # Push the version-bump commit.
      - run: git push

      # Tag + GitHub Release for this version (skip if it already exists — e.g. a
      # re-run with no new changeset). gh creates the tag on the pushed commit.
      - name: GitHub Release
        run: |
          V=$(node -p "require('./packages/cli/package.json').version")
          if gh release view "v$V" >/dev/null 2>&1; then
            echo "release v$V already exists — skipping"
          else
            gh release create "v$V" --title "v$V" --generate-notes
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
