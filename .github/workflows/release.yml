name: Release

on:
  workflow_dispatch:
    inputs:
      notes:
        description: "Release notes (include [FORCE] to make update mandatory)"
        required: false
        default: ""

jobs:
  release:
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - uses: dtolnay/rust-toolchain@stable

      - name: Install dependencies
        run: pnpm install

      - name: Build Vite + server
        run: pnpm --filter @slsv/ui build

      - name: Build Tauri
        run: pnpm --filter @slsv/ui tauri build
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}

      - name: Check version not already released
        run: |
          VERSION=$(jq -r .version packages/ui/src-tauri/tauri.conf.json)
          if gh release view "v$VERSION" &>/dev/null; then
            echo "ERROR: v$VERSION already exists. Bump version in tauri.conf.json and Cargo.toml first."
            exit 1
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate latest.json
        id: meta
        run: |
          VERSION=$(jq -r .version packages/ui/src-tauri/tauri.conf.json)
          echo "version=$VERSION" >> $GITHUB_OUTPUT

          SIG=$(cat packages/ui/src-tauri/target/release/bundle/macos/*.app.tar.gz.sig)
          FILENAME=$(basename packages/ui/src-tauri/target/release/bundle/macos/*.app.tar.gz)
          NOTES="${{ github.event.inputs.notes }}"

          cat > latest.json <<EOF
          {
            "version": "$VERSION",
            "notes": "$NOTES",
            "pub_date": "$(date -u +%Y-%m-%dT%H:%M:%SZ)",
            "platforms": {
              "darwin-aarch64": {
                "signature": "$SIG",
                "url": "https://github.com/vincentri/slsv/releases/download/v$VERSION/$FILENAME"
              },
              "darwin-x86_64": {
                "signature": "$SIG",
                "url": "https://github.com/vincentri/slsv/releases/download/v$VERSION/$FILENAME"
              }
            }
          }
          EOF

      - name: Upload stable release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.meta.outputs.version }}
          prerelease: false
          name: v${{ steps.meta.outputs.version }}
          body: ${{ github.event.inputs.notes }}
          files: |
            packages/ui/src-tauri/target/release/bundle/macos/*.dmg
            packages/ui/src-tauri/target/release/bundle/macos/*.app.tar.gz
            packages/ui/src-tauri/target/release/bundle/macos/*.app.tar.gz.sig
            latest.json
