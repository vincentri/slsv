name: Docs

on:
  push:
    branches: [main]
    paths:
      - "packages/**"
      - "scripts/docs/**"
      - "docs/**"
      - "mkdocs.yml"
      - "typedoc.json"
      - "package.json"
      - "pnpm-lock.yaml"
      - ".github/workflows/docs.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Avoid two deploys racing on the same push; cancel any in-flight run for the same ref.
concurrency:
  group: docs-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 11

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install mkdocs-material
        run: python -m pip install --quiet mkdocs mkdocs-material

      - name: Install JS deps
        run: pnpm install --frozen-lockfile

      # pnpm 11 silently ignores `onlyBuiltDependencies` — the `dangerouslyAllowAllBuilds`
      # file in scaffolded apps handles esbuild/vite. The monorepo doesn't have it; if any
      # dep here has a postinstall, allow it (none should — typedoc/zod-to-json-schema are
      # pure JS).
      - name: Build all packages
        run: pnpm build

      - name: Run docs generators + mkdocs build (strict)
        run: pnpm build:docs

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4